server.port=8080

# MongoDB connection
spring.data.mongodb.uri=mongodb://mongodb:27017/employeedb
spring.data.mongodb.database=employeedb

# Allow cross-origin from React dev server
# (handled via @CrossOrigin in controller)

# Logging
logging.level.com.example.employee=DEBUG

# Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# JWT
jwt.secret=employeeManagementSecretKey2024SuperLongSecretKeyForSecurity
jwt.expiration=86400000

# Email (update with your SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=uploads/photos

# Actuator (Prometheus)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Pagination defaults
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100

# Logging
logging.level.com.example.employee=DEBUG
spring.main.allow-circular-references=true
