apiVersion: apps/v1
kind: Deployment
metadata:
  name: emp-backend
  namespace: default
  labels:
    app: emp-backend
    version: "latest"
spec:
  replicas: 2                        # ✅ Min 2 pods across workers
  selector:
    matchLabels:
      app: emp-backend
  
  strategy:
    type: RollingUpdate              # ✅ Zero downtime deployment
    rollingUpdate:
      maxSurge: 1                    # 1 extra pod during update
      maxUnavailable: 0              # never kill pod before new one ready

  template:
    metadata:
      labels:
        app: emp-backend
    spec:

      # ✅ Block control-plane (mmp) — only workers allowed
      tolerations: []

      # ✅ Spread pods across FREE worker nodes automatically
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - emp-backend
              topologyKey: kubernetes.io/hostname  # different nodes

      containers:
      - name: emp-backend
        image: mmpstscc/emp-backend:latest   # ✅ Jenkins updates this tag
        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        # ✅ MongoDB connection
        env:
        - name: SPRING_DATA_MONGODB_URI
          value: mongodb://mongodb:27017/employeedb

        # ✅ Health Checks (your values were good, kept same)
        livenessProbe:
          httpGet:
            path: /api/employees
            port: 8080
          initialDelaySeconds: 40    # wait 40s before first check
          periodSeconds: 10          # check every 10s
          failureThreshold: 3        # restart after 3 failures

        readinessProbe:
          httpGet:
            path: /api/employees
            port: 8080
          initialDelaySeconds: 20    # wait 20s before accepting traffic
          periodSeconds: 5           # check every 5s
          failureThreshold: 3        # remove from service after 3 failures

        # ✅ Resources for HPA to work
        resources:
          requests:
            memory: "256Mi"          # K8s reserves this on node
            cpu: "250m"              # HPA watches this
          limits:
            memory: "512Mi"          # hard limit
            cpu: "500m"              # hard limit

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: default
spec:
  type: ClusterIP                    # ✅ Internal only (Ingress handles external)
  selector:
    app: emp-backend
  ports:
  - name: http
    port: 8085                       # ✅ Service port (other pods call this)
    targetPort: 8080                 # ✅ Container port
